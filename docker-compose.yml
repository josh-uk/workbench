name: workbench

services:
  app:
    image: ${WORKBENCH_IMAGE:-ghcr.io/josh-uk/workbench:latest}
    init: true
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-workbench}:${POSTGRES_PASSWORD:-workbench}@database:5432/${POSTGRES_DB:-workbench}
      AZURE_CONFIG_DIR: /home/nextjs/.azure
      WORKBENCH_BACKUP_DIR: /backups
      WORKBENCH_BACKUP_PASSWORD: ${WORKBENCH_BACKUP_PASSWORD:-}
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - workbench_backups:/backups
      - workbench_azure_cli:/home/nextjs/.azure
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:3000/api/health >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  database:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workbench}
      POSTGRES_USER: ${POSTGRES_USER:-workbench}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workbench}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - workbench_postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-workbench} -d ${POSTGRES_DB:-workbench}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  workbench_postgres_data:
    name: workbench_postgres_data
  workbench_backups:
    name: workbench_backups
  workbench_azure_cli:
    name: workbench_azure_cli
