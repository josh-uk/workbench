name: Bug report
description: Report a reproducible problem in Workbench
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Workbench. Never include secrets or private API data.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open…
        2. Select…
        3. Observe…
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Workbench version
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Docker Compose
        - Local Node.js development
        - Other
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitised diagnostics
      description: Remove tokens, cookies, credentials, URLs, and secret variables before submitting.
      render: shell
