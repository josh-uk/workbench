name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit:coverage
      - run: npm run test:component
      - run: npm run db:check
      - run: npm run build
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

  integration:
    name: Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: workbench_test
          POSTGRES_USER: workbench
          POSTGRES_PASSWORD: workbench
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U workbench -d workbench_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://workbench:workbench@127.0.0.1:5432/workbench_test
      TEST_DATABASE_URL: postgresql://workbench:workbench@127.0.0.1:5432/workbench_test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run test:integration

  end-to-end:
    name: End-to-end
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: workbench_e2e
          POSTGRES_USER: workbench
          POSTGRES_PASSWORD: workbench
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U workbench -d workbench_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://workbench:workbench@127.0.0.1:5432/workbench_e2e
      TEST_DATABASE_URL: postgresql://workbench:workbench@127.0.0.1:5432/workbench_e2e
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

  container:
    name: Container
    runs-on: ubuntu-latest
    needs: [quality, integration]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: workbench:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
